# Ambiente conda para o conversor Convert2nc (Eta -> NetCDF)
#
# IMPORTANTE: use ESTE ambiente para GRIB2. O cfgrib/eccodes do PyPI dependem do
# 'findlibs', que usa o operador ':=' (Python 3.8+) e QUEBRA no Python 3.6 do
# sistema. O conda-forge traz o eccodes (lib de sistema) + Python moderno, sem
# esse problema. Serve também para o binário GrADS (numpy/pandas/xarray/netcdf4).
#
# Criar:      conda env create -f environment.yml
# Ativar:     conda activate convert2nc
# Atualizar:  conda env update -f environment.yml --prune
#
# Dica: use mamba (mais rápido) no lugar de conda, se tiver instalado.

name: convert2nc
channels:
  - conda-forge
dependencies:
  - python=3.11     # >=3.8 (o cfgrib/findlibs do PyPI não roda no 3.6 do cluster)
  - numpy
  - pandas
  - xarray
  - netcdf4
  - cfgrib          # leitura de GRIB2 (sem wgrib2)
  - eccodes         # backend GRIB (lib de sistema) exigido pelo cfgrib
  # - wgrib2        # opcional: só se usar --grib-engine wgrib2
